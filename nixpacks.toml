# nixpacks.toml at repo ROOT — tells Railway to build the backend
[phases.setup]
nixPkgs = ["python310", "ffmpeg", "nodejs"]

[phases.install]
cmds = [
  "cd frontend && npm install && npm run build",
  "pip install -r requirements.txt"
]

[start]
cmd = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
