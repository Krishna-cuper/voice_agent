# nixpacks.toml at repo ROOT — tells Railway how to build the full-stack app
[phases.setup]
nixPkgs = ["python310", "ffmpeg", "nodejs_20"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "cd frontend && npm install"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
