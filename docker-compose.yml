version: '3.9'

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: agentup_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Welcome@123
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Whisper ASR (Speech-to-Text) ────────────────────────────────────────
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: agentup_whisper
    restart: unless-stopped
    environment:
      ASR_MODEL: base
    ports:
      - "9000:9000"

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentup_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:Welcome@123@db:5432/postgres
      WHISPER_URL: http://whisper:9000
      OLLAMA_URL: http://host.docker.internal:11434
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      whisper:
        condition: service_started
    volumes:
      - ./backend:/app

  # ── React Frontend (Nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentup_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
